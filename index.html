<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THRIVA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root {
      --black: #050505;
      --black2: #0d0d0d;
      --black3: #111;
      --green: #39ff14;
      --green2: #22cc00;
      --green3: #0f7a00;
      --green-glow: rgba(57,255,20,0.18);
      --green-glow2: rgba(57,255,20,0.06);
      --white: #f0f0f0;
      --gray: #888;
      --gray2: #333;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      position: relative;
      padding: 0 16px 60px;
    }

    /* ── NOISE GRAIN OVERLAY ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 999;
    }

    /* ── BG GRID ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── AMBIENT GLOW ── */
    .glow-top {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(57,255,20,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .glow-bottom {
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 500px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(57,255,20,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCANLINE ── */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: scan 5s linear infinite;
      pointer-events: none;
      z-index: 998;
      opacity: 0.4;
    }

    @keyframes scan {
      0% { top: -2px; }
      100% { top: 100vh; }
    }

    /* ── CONTAINER ── */
    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 10;
      padding-top: 48px;
    }

    /* ── LOGO SECTION ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease both;
    }

    .logo-frame {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .logo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 22px;
      position: relative;
      z-index: 2;
      display: block;
    }

    /* rotating border */
    .logo-ring {
      position: absolute;
      inset: -5px;
      border-radius: 27px;
      background: conic-gradient(from 0deg, var(--green), transparent 60%, var(--green));
      animation: spin 3s linear infinite;
      z-index: 1;
    }

    .logo-ring::after {
      content: "";
      position: absolute;
      inset: 3px;
      background: var(--black);
      border-radius: 25px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* pulse glow under logo */
    .logo-glow {
      position: absolute;
      inset: -10px;
      border-radius: 32px;
      background: var(--green);
      opacity: 0;
      filter: blur(20px);
      animation: pulse 2.5s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.08; transform: scale(0.9); }
      50% { opacity: 0.2; transform: scale(1.05); }
    }

    /* ── TITLE ── */
    .title-wrap {
      text-align: center;
      margin-bottom: 6px;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      letter-spacing: 6px;
      color: var(--white);
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    /* green underline accent */
    .brand-name::after {
      content: "";
      display: block;
      height: 3px;
      width: 60%;
      margin: 4px auto 0;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .tag {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--green);
      font-weight: 500;
      margin-top: 10px;
      display: block;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gray2));
    }

    .divider-line.right {
      background: linear-gradient(90deg, var(--gray2), transparent);
    }

    .divider-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 14px;
      padding-left: 2px;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    /* ── BUTTONS ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.8s 0.35s ease both;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--white);
      background: var(--black3);
      border: 1px solid var(--gray2);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      cursor: pointer;
    }

    /* left green bar */
    .btn::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--green);
      transform: scaleY(0);
      transition: transform 0.3s ease;
      border-radius: 0 2px 2px 0;
    }

    /* hover shimmer */
    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(57,255,20,0.06) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .btn:hover {
      border-color: var(--green);
      background: rgba(57,255,20,0.06);
      transform: translateX(6px);
      box-shadow: 0 0 20px rgba(57,255,20,0.1), inset 0 0 20px rgba(57,255,20,0.03);
    }

    .btn:hover::before { transform: scaleY(1); }
    .btn:hover::after { transform: translateX(100%); }

    .btn:active {
      transform: translateX(4px) scale(0.99);
    }

    .btn-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--black2);
      border: 1px solid var(--gray2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--green);
      flex-shrink: 0;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .btn:hover .btn-icon {
      background: rgba(57,255,20,0.12);
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(57,255,20,0.25);
    }

    .btn-text {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .btn-text .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      display: block;
    }

    .btn-text .desc {
      font-size: 11px;
      color: var(--gray);
      font-weight: 400;
      margin-top: 1px;
      display: block;
    }

    .btn-arrow {
      color: var(--gray2);
      font-size: 13px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .btn:hover .btn-arrow {
      color: var(--green);
      transform: translateX(3px);
    }

    /* ── SOCIAL ── */
    .social-wrap {
      margin-top: 28px;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .social-btn {
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gray);
      text-decoration: none;
      font-size: 18px;
      background: var(--black3);
      border: 1px solid var(--gray2);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }

    .social-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--green);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .social-btn i { position: relative; z-index: 1; }

    .social-btn:hover {
      border-color: var(--green);
      color: var(--black);
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 8px 24px rgba(57,255,20,0.25);
    }

    .social-btn:hover::before { opacity: 1; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 36px;
      text-align: center;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .footer-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--gray);
      font-size: 11px;
      letter-spacing: 1px;
    }

    .footer-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.5;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(57,255,20,0.07);
      border: 1px solid rgba(57,255,20,0.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--green);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.4s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* stagger each button */
    .btn:nth-child(1) { animation: fadeUp 0.5s 0.35s ease both; }
    .btn:nth-child(2) { animation: fadeUp 0.5s 0.42s ease both; }
    .btn:nth-child(3) { animation: fadeUp 0.5s 0.49s ease both; }
    .btn:nth-child(4) { animation: fadeUp 0.5s 0.56s ease both; }
    .btn:nth-child(5) { animation: fadeUp 0.5s 0.63s ease both; }

    /* ── GLITCH EFFECT ON TITLE HOVER ── */
    .brand-name:hover {
      animation: glitch 0.3s ease;
    }

    @keyframes glitch {
      0% { text-shadow: none; }
      20% { text-shadow: 2px 0 var(--green), -2px 0 rgba(57,255,20,0.3); transform: skewX(-2deg); }
      40% { text-shadow: -2px 0 var(--green), 2px 0 rgba(57,255,20,0.3); transform: skewX(2deg); }
      60% { text-shadow: 1px 0 var(--green); transform: skewX(0); }
      100% { text-shadow: none; }
    }

    /* corner decorations */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      pointer-events: none;
      z-index: 20;
    }

    .corner.tl { top: 16px; left: 16px; border-top: 2px solid var(--green); border-left: 2px solid var(--green); }
    .corner.tr { top: 16px; right: 16px; border-top: 2px solid var(--green); border-right: 2px solid var(--green); }
    .corner.bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--green); border-left: 2px solid var(--green); }
    .corner.br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); }

    @media (max-width: 480px) {
      .brand-name { font-size: 58px; }
      .container { padding-top: 36px; }
    }
  </style>
</head>
